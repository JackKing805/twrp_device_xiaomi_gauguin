name: Build TWRP for gauguin

on:
  workflow_dispatch:

env:
  MANIFEST: https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git
  BRANCH: twrp-12.1
  DEVICE: gauguin
  DT: https://github.com/Seifood/device_xiaomi_gauguin-TWRP.git
  DT_BRANCH: android-12.1

jobs:
  build:
    runs-on: ubuntu-20.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git gnupg flex bison gperf build-essential zip curl zlib1g-dev gcc-multilib g++-multilib libc6-dev-i386 lib32ncurses-dev lib32z1-dev libssl-dev libncurses5 libncurses5-dev libtinfo5 repo python3 python-is-python3 ccache

      - name: Configure Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Initialize TWRP Source
        run: |
          mkdir -p twrp
          cd twrp
          repo init -u ${{ env.MANIFEST }} -b ${{ env.BRANCH }} --depth=1
          repo sync -c -j$(nproc) --no-tags --no-clone-bundle

      - name: Clone Device Tree
        run: |
          cd twrp
          git clone ${{ env.DT }} -b ${{ env.DT_BRANCH }} device/xiaomi/gauguin

      - name: Build TWRP
        run: |
          cd twrp
          export ALLOW_MISSING_DEPENDENCIES=true
          export USE_CCACHE=1
          export CCACHE_DIR=/tmp/ccache
          source build/envsetup.sh
          lunch twrp_gauguin-userdebug
          mka recoveryimage -j$(nproc) 2>&1 | tail -100

      - name: Upload Recovery Image
        uses: actions/upload-artifact@v4
        with:
          name: twrp-gauguin
          path: twrp/out/target/product/gauguin/recovery.img
          if-no-files-found: error

      - name: Upload Boot Image (if exists)
        uses: actions/upload-artifact@v4
        with:
          name: boot-gauguin
          path: twrp/out/target/product/gauguin/boot.img
          if-no-files-found: warn
