name: PBRP Organization CI (Optimized Speed)

on:
  workflow_dispatch:
    inputs:
      DEPLOY_TYPE:
        description: 'Deploy Type (TEST/BETA/OFFICIAL)'
        required: true
        default: 'TEST'
      ChangeLogs:
        description: 'Build ChangeLogs'
        required: true
        default: 'Sync Latest Source'

env:
  BUILD_RELEASE_TYPE: ${{ github.event.inputs.DEPLOY_TYPE }}
  CHANGELOG: ${{ github.event.inputs.ChangeLogs }}
  BOT_API: ${{ secrets.BOT_API }}
  GCF_AUTH_KEY: ${{ secrets.GCF_AUTH_KEY }}
  GH_BOT_TOKEN: ${{ secrets.GH_BOT_TOKEN }}
  GitHubMail: ${{ secrets.GitHubMail }}
  GitHubName: ${{ secrets.GitHubName }}
  SFPassword: ${{ secrets.SFPassword }}
  SFUserName: ${{ secrets.SFUserName }}
  TARGET: "pbrp"
  
  CCACHE_DIR: ${{ github.workspace }}/.ccache
  CCACHE_MAX_SIZE: 5G 

jobs:
  PBRP_CI:
    if: "(! contains(toJSON(github.event.commits.*.message), '[skip-ci]'))"
    runs-on: ubuntu-latest 

    steps:
      # --- BARIS INI DITAMBAHKAN UNTUK MENGINSTALL CCACHE ---
      - name: Install ccache
        run: |
          sudo apt-get update
          sudo apt-get install ccache -y

      # --- SETUP CACHE ---
      - name: Restore ccache
        uses: actions/cache@v3
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ${{ runner.os }}-ccache-pbrp-${{ github.ref_name }}-${{ hashFiles('build/make/core/build_id.mk') }}
          restore-keys: |
            ${{ runner.os }}-ccache-pbrp-${{ github.ref_name }}-

      - name: Configure ccache
        run: |
          # Sekarang ccache sudah terinstal
          echo "CCACHE_EXEC=/usr/bin/ccache" >> $GITHUB_ENV
          echo "USE_CCACHE=1" >> $GITHUB_ENV
          ccache -M ${{ env.CCACHE_MAX_SIZE }}
          ccache -z # Reset statistik cache sebelum sinkronisasi

      # --- PREP & CHECKS ---
      - name: Auto Adapt Manifest
        run: echo "MANIFEST=https://github.com/PitchBlackRecoveryProject/manifest_pb -b ${{ github.ref_name }}" >> $GITHUB_ENV

      - name: Export Release Vars
        run: |
          if [[ ${BUILD_RELEASE_TYPE} == "TEST" ]]; then echo "TEST_BUILD=true"  >> $GITHUB_ENV;fi
          if [[ ${BUILD_RELEASE_TYPE} == "BETA" ]]; then echo "BETA_BUILD=true"  >> $GITHUB_ENV;fi
          if [[ ${BUILD_RELEASE_TYPE} == "OFFICIAL" ]]; then echo "PB_OFFICIAL=true"  >> $GITHUB_ENV;fi

      - name: Set Swap Space
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 12
      
      # --- Checkout & Cleaning ---
      - name: Checkout Cleaning Up Runner Repo
        uses: actions/checkout@v4 # Diperbarui ke v4
        with:
          repository: PitchBlackRecoveryProject/Cleaner
          ref: main
          token: ${{ secrets.GH_BOT_TOKEN }}
          path: .github/actions/Cleaner
      - name: Cleaning
        uses: ./.github/actions/Cleaner
      
      # --- Checkout Compiler ---
      - name: Checkout Recovery Compiler Repo
        uses: actions/checkout@v4 # Diperbarui ke v4
        with:
          repository: erwinabs/Compiler
          ref: production
          token: ${{ secrets.GH_BOT_TOKEN }}
          path: .github/actions/Compiler
      - name: Recovery Compilation
        uses: ./.github/actions/Compiler
      
      # --- SAVE CACHE & RELEASE ---
      - name: Save ccache
        uses: actions/cache@v3
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ${{ runner.os }}-ccache-pbrp-${{ github.ref_name }}-${{ hashFiles('build/make/core/build_id.mk') }}
          if: always() 

      - name: Release Builds 
        run: |
          sudo apt-get update && sudo apt-get install sshpass -y
          cd $BuildPath 
          bash vendor/utils/pb_deploy.sh ${BUILD_RELEASE_TYPE} ${VENDOR} ${CODENAME}
          
